<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Owner Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        /* navbar */

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .logout {
            background: #e74c3c;
            border: none;
            padding: 8px 15px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        /* dashboard cards */

        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px 60px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .card h2 {
            font-size: 35px;
            margin: 0;
        }

        /* chart */

        .chart-box {
            padding: 20px 60px;
        }

        canvas {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
        }

        /* table */

        .section {
            padding: 20px 60px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
        }

        th {
            background: rgba(255, 255, 255, 0.1);
        }

        /* status */

        .status {
            padding: 5px 10px;
            border-radius: 6px;
        }

        .wait {
            background: #f1c40f;
        }

        .progress {
            background: #3498db;
        }

        .done {
            background: #2ecc71;
        }

        /* search */

        .search {
            margin-bottom: 10px;
        }

        .search input {
            padding: 8px;
            border: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">🚗 Owner Pro Dashboard</div>
        <button class="logout" onclick="logout()">ออกจากระบบ</button>
    </div>

    <!-- dashboard -->

    <div class="dashboard">

        <div class="card">
            <p>รถวันนี้</p>
            <h2 id="carToday">0</h2>
        </div>

        <div class="card">
            <p>รายได้วันนี้</p>
            <h2 id="incomeToday">0</h2>
        </div>

        <div class="card">
            <p>รายได้เดือนนี้</p>
            <h2 id="incomeMonth">0</h2>
        </div>

        <div class="card">
            <p>พนักงาน</p>
            <h2 id="staffTotal">0</h2>
        </div>

    </div>

    <!-- chart -->

    <div class="chart-box">
        <h2>📈 รายได้ 7 วันล่าสุด</h2>
        <canvas id="incomeChart"></canvas>
    </div>

    <!-- car table -->

    <div class="section">

        <h2>🚗 รถที่เข้ามาล้าง</h2>

        <div class="search">
            <input type="text" id="search" placeholder="ค้นหาลูกค้า/ทะเบียน" onkeyup="searchCar()">
        </div>

        <table>

            <tr>
                <th>ลูกค้า</th>
                <th>ทะเบียน</th>
                <th>แพ็คเกจ</th>
                <th>สถานะ</th>
            </tr>

            <tbody id="carTable"></tbody>

        </table>

    </div>

    <!-- staff table -->

    <div class="section">

        <h2>👨‍🔧 พนักงาน</h2>

        <table>

            <tr>
                <th>ชื่อ</th>
                <th>ตำแหน่ง</th>
            </tr>

            <tbody id="staffTable"></tbody>

        </table>

    </div>

    <script>

        /* role check */

        let role = localStorage.getItem("userRole");

        if (role !== "owner") {
            alert("ไม่มีสิทธิ์เข้า");
            window.location.href = "index.html";
        }

        /* bookings */

        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

        /* staff demo */

        let staff = [
            { name: "สมชาย", role: "ล้างรถ" },
            { name: "อนันต์", role: "เช็ดรถ" },
            { name: "วิชัย", role: "แคชเชียร์" },
            { name: "ธนา", role: "ดูดฝุ่น" }
        ];

        /* price */

        let price = {
            Basic: 100,
            Premium: 200,
            VIP: 300
        };

        /* dashboard */

        function loadDashboard() {

            document.getElementById("carToday").innerText = bookings.length;

            let income = 0;

            bookings.forEach(b => {
                if (b.status === "done") {
                    income += price[b.package] || 0;
                }
            });

            document.getElementById("incomeToday").innerText = income + " บาท";

            document.getElementById("incomeMonth").innerText = income * 30 + " บาท";

            document.getElementById("staffTotal").innerText = staff.length;

        }

        /* car table */

        function loadCars() {

            let table = document.getElementById("carTable");

            table.innerHTML = "";

            bookings.forEach(b => {

                table.innerHTML += `

<tr>
<td>${b.name}</td>
<td>${b.plate}</td>
<td>${b.package}</td>
<td><span class="status ${b.status}">${b.status}</span></td>
</tr>

`;

            });

        }

        /* staff table */

        function loadStaff() {

            let table = document.getElementById("staffTable");

            table.innerHTML = "";

            staff.forEach(s => {

                table.innerHTML += `

<tr>
<td>${s.name}</td>
<td>${s.role}</td>
</tr>

`;

            });

        }

        /* search */

        function searchCar() {

            let input = document.getElementById("search").value.toLowerCase();

            let rows = document.querySelectorAll("#carTable tr");

            rows.forEach(r => {

                let text = r.innerText.toLowerCase();

                r.style.display = text.includes(input) ? "" : "none";

            });

        }

        /* chart */

        function loadChart() {

            let data = [500, 700, 400, 900, 1200, 800, 1000];

            new Chart(document.getElementById("incomeChart"), {

                type: "line",

                data: {
                    labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
                    datasets: [{
                        label: "รายได้",
                        data: data,
                        borderWidth: 3,
                        tension: 0.4
                    }]
                }

            });

        }

        /* logout */

        function logout() {

            localStorage.clear();

            window.location.href = "index.html";

        }

        loadDashboard();
        loadCars();
        loadStaff();
        loadChart();

    </script>

</body>

</html>
